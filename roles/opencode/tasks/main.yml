---
- name: Setup opencode config
  ansible.builtin.file:
    src: "{{ role_path }}/files"
    dest: ~/.config/opencode
    mode: u=rwx,go=r
    state: link

- name: Ensure codex config directory exists
  ansible.builtin.file:
    path: ~/.codex
    state: directory
    mode: u=rwx,go=

- name: Ensure claude config directory exists
  ansible.builtin.file:
    path: ~/.claude
    state: directory
    mode: u=rwx,go=

- name: Share OpenCode AGENTS.md with Codex
  ansible.builtin.file:
    src: "{{ role_path }}/files/AGENTS.md"
    dest: ~/.codex/AGENTS.md
    state: link
    force: true

- name: Find OpenCode skills
  ansible.builtin.find:
    paths: "{{ role_path }}/files/skills"
    file_type: directory
    recurse: false
  register: opencode_skills_dir

- name: Ensure codex skills directory exists
  ansible.builtin.file:
    path: ~/.codex/skills
    state: directory
    mode: u=rwx,go=

- name: Share OpenCode skills with Codex
  loop: "{{ opencode_skills_dir.files }}"
  ansible.builtin.file:
    src: "{{ item.path }}"
    dest: "~/.codex/skills/{{ item.path | basename }}"
    state: link
    force: true

- name: Share OpenCode AGENTS.md with Claude
  ansible.builtin.file:
    src: "{{ role_path }}/files/AGENTS.md"
    dest: ~/.claude/CLAUDE.md
    state: link
    force: true

- name: Ensure claude skills directory exists
  ansible.builtin.file:
    path: ~/.claude/skills
    state: directory
    mode: u=rwx,go=

- name: Share OpenCode skills with Claude
  loop: "{{ opencode_skills_dir.files }}"
  ansible.builtin.file:
    src: "{{ item.path }}"
    dest: "~/.claude/skills/{{ item.path | basename }}"
    state: link
    force: true
