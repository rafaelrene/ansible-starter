    dest: ~/.claude/skills/{{ item.path | basename }}
    state: link
    force: true

- name: Ensure pi skills directory exists
  ansible.builtin.file:
    path: ~/.config/pi/skills
    state: directory
    mode: u=rwx,go=

- name: Symlink skills to Pi
  loop: "{{ skills_dir.files }}"
  ansible.builtin.file:
    src: "{{ item.path }}"
    dest: ~/.config/pi/skills/{{ item.path | basename }}
    state: link
    force: true
